# =============================================================================
# Washington has no state income tax on wages/salaries.
# Washington DOES have a capital gains tax (7% - 9.9% on gains > $278K)
# =============================================================================

# Identity
jurisdiction_id: "US-WA"
tax_year: 2025

# Metadata
jurisdiction_type: "state"
jurisdiction_name: "Washington"
jurisdiction_abbreviation: "WA"
parent_jurisdiction_id: "US"

# Tax characteristics - NO GENERAL INCOME TAX (but has capital gains tax)
has_income_tax: false
income_tax_type: "none"

# Effective dates
effective_start_date: "2025-01-01"
effective_end_date: "2025-12-31"

# Rate Schedule - NO TAX on regular income
rate_schedule:
  rate_type: "none"
  flat_rate: null
  brackets: []
  surtaxes: []

# Deductions - Not applicable for regular income
deductions:
  standard_deduction:
    available: false
    amounts: []
    additional_amounts: []
  exemptions:
    personal_exemption_available: false
    personal_exemption_amount: 0
    dependent_exemption_available: false
    dependent_exemption_amount: 0

# State-specific configuration
state_config:
  starting_point: "not_applicable"
  has_local_income_tax: false
  local_tax_mandatory: false
  reciprocity_states: []
  capital_gains_tax:
    enabled: true
    brackets:
      - threshold: 278000
        rate: 0.07
      - threshold: 1000000
        rate: 0.099
    notes: "Washington taxes capital gains: 7% on gains > $278,000, 9.9% on gains > $1,000,000"
  special_notes:
    - "Washington has no state income tax on wages/salaries"
    - "Capital gains tax: 7% on gains > $278,000, 9.9% on gains > $1,000,000"

# Verification
verification:
  status: "verified"
  last_verified: "2025-02-20"
  verified_by: "opencode"
  notes: "Washington capital gains tax verified for 2025"

references:
  - source_name: "Washington Department of Revenue"
    url: "https://dor.wa.gov/"
    retrieved_date: "2025-02-20"
    notes: "Washington capital gains tax: 7% over $278k, 9.9% over $1M"
