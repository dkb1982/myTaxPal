# =============================================================================
# Philadelphia - Wage tax (flat rate, different for residents/non-residents)
# 2025 rates verified - reduced effective July 1, 2025
# =============================================================================

# Identity
jurisdiction_id: "US-PA-PHL"
tax_year: 2025

# Metadata
jurisdiction_type: "city"
jurisdiction_name: "Philadelphia"
jurisdiction_abbreviation: "PHL"
parent_jurisdiction_id: "US-PA"
parent_state: "PA"

# Geographic identifiers
fips_code: "4260000"
zip_prefixes:
  - "190"
  - "191"

# Tax characteristics
has_income_tax: true
tax_type: "city_wage_tax"
applies_to: "both_residents_and_workers"

# Effective dates
effective_start_date: "2025-01-01"
effective_end_date: "2025-12-31"

# Rate Schedule - FLAT TAX (different rates for residents/non-residents)
rate_schedule:
  rate_type: "flat"
  tax_base: "wages_only"

  flat_rates:
    resident_rate: 0.0374
    nonresident_rate: 0.0343

# Filing requirements
filing:
  filing_required: true
  filing_threshold: 0
  form_name: "Philadelphia Wage Tax Return"
  collection_agency: "Philadelphia Department of Revenue"

# Local-specific configuration
local_config:
  tax_base_includes:
    - "Wages and salaries"
    - "Commissions"
    - "Bonuses"
    - "Stock options (at exercise)"
    - "Net self-employment income"
  tax_base_excludes:
    - "Interest and dividends"
    - "Capital gains"
    - "Rental income"
    - "Retirement income"
  withholding_required: true
  employer_withholding: true
  special_notes:
    - "Philadelphia wage tax is one of the highest local taxes in the US"
    - "Rates reduced July 1, 2025: resident 3.74%, nonresident 3.43%"
    - "Only wages/earned income are taxed, not investment income"
    - "Philadelphia does NOT use the PA EIT system"

# Verification
verification:
  status: "verified"
  last_verified: "2025-02-20"
  verified_by: "opencode"
  notes: "Philadelphia rates updated for 2025"

references:
  - source_name: "Philadelphia Department of Revenue"
    url: "https://www.phila.gov/revenue/"
    retrieved_date: "2025-02-20"
    notes: "Philadelphia wage tax rates 2025"
