income_tax_type: "graduated"

# Effective dates
effective_start_date: "2025-01-01"
effective_end_date: "2025-12-31"

# Rate Schedule (simplified - Germany uses continuous formula)
# Note: These are simplified brackets approximating the progressive formula
rate_schedule:
  rate_type: "graduated"
  flat_rate: null
  brackets:
    # Grundfreibetrag (tax-free threshold) - 2025 value
    - bracket_id: "DE-2025-BASIC"
      filing_status: "all"
      income_from: 0
      income_to: 12096
      rate: 0.00
      base_tax: 0
    # Progressive zone 1 (simplified average)
    - bracket_id: "DE-2025-PROG1"
      filing_status: "all"
      income_from: 12096
      income_to: 17005
      rate: 0.14
      base_tax: 0
    # Progressive zone 2 (simplified average)
    - bracket_id: "DE-2025-PROG2"
      filing_status: "all"
      income_from: 17005
      income_to: 68429
      rate: 0.24
      base_tax: 687
    # Proportional zone (42%) - 2025 threshold
    - bracket_id: "DE-2025-PROP"
      filing_status: "all"
      income_from: 68429
      income_to: 277825
      rate: 0.42
      base_tax: 14189
    # Reichensteuer (45%)
    - bracket_id: "DE-2025-REICH"
      filing_status: "all"
      income_from: 277825
      income_to: null
      rate: 0.45
      base_tax: 101115
  surtaxes: []

# Solidarity Surcharge - 5.5% (only applies to higher incomes since 2021)
