# =============================================================================
# Hong Kong Tax Rules - 2025-26 Tax Year
# =============================================================================
# Hong Kong Tax Year: April 1 to March 31
# Tax is lower of progressive rates or two-tier standard rate
# Source: IRD Hong Kong
# =============================================================================

jurisdiction_id: "HK"
tax_year: 2025
jurisdiction_type: "country"
jurisdiction_name: "Hong Kong"
jurisdiction_abbreviation: "HK"
parent_jurisdiction_id: null

country_code: "HK"
currency_code: "HKD"
tax_year_format: "hk_fiscal"

has_income_tax: true
income_tax_type: "graduated"

effective_start_date: "2025-04-01"
effective_end_date: "2026-03-31"

# Progressive rates (standard rate is alternative)
rate_schedule:
  rate_type: "graduated"
  flat_rate: 0.15
  standard_rate_tiers:
    - tier: 1
      threshold: 5000000
      rate: 0.15
      description: "15% on first HK$5M"
    - tier: 2
      threshold: null
      rate: 0.16
      description: "16% on income above HK$5M"
  brackets:
    - bracket_id: "HK-2025-2"
      filing_status: "all"
      income_from: 0
      income_to: 50000
      rate: 0.02
      base_tax: 0
    - bracket_id: "HK-2025-6"
      filing_status: "all"
      income_from: 50000
      income_to: 100000
      rate: 0.06
      base_tax: 1000
    - bracket_id: "HK-2025-10"
      filing_status: "all"
      income_from: 100000
      income_to: 150000
      rate: 0.10
      base_tax: 4000
    - bracket_id: "HK-2025-14"
      filing_status: "all"
      income_from: 150000
      income_to: 200000
      rate: 0.14
      base_tax: 9000
    - bracket_id: "HK-2025-17"
      filing_status: "all"
      income_from: 200000
      income_to: null
      rate: 0.17
      base_tax: 16000
  surtaxes: []

social_insurance:
  components:
    - component_id: "HK-MPF"
      name: "Mandatory Provident Fund"
      type: "pension"
      employee_rate: 0.05
      employer_rate: 0.05
      ceiling: 18000
      floor: 85200
      notes: "5% capped at HKD 1,500/month"
  calculation_method: "percentage"
  employer_contribution: true
  employee_contribution: true

deductions:
  standard_deduction:
    available: false
    amounts: []
    additional_amounts: []
  exemptions:
    personal_exemption_available: true
    personal_exemption_amount: 132000
    dependent_exemption_available: true
    dependent_exemption_amount: 130000

verification:
  status: "verified"
  last_verified: "2026-02-17"
  verified_by: "external_consultant"
  notes: "Two-tier standard rate added (15% first $5M, 16% above)."

references:
  - source_name: "IRD Hong Kong"
    url: "https://www.ird.gov.hk"
    retrieved_date: "2026-02-17"
