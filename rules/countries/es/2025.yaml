    - bracket_id: "ES-2025-24"
      filing_status: "all"
      income_from: 12450
      income_to: 20200
      rate: 0.24
      base_tax: 2366  # (12450-0) * 0.19
    - bracket_id: "ES-2025-30"
      filing_status: "all"
      income_from: 20200
      income_to: 35200
      rate: 0.30
      base_tax: 4226  # 2366 + (20200-12450) * 0.24
    - bracket_id: "ES-2025-37"
      filing_status: "all"
      income_from: 35200
      income_to: 60000
      rate: 0.37
