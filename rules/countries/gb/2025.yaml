# =============================================================================
# United Kingdom (UK) Tax Rules - 2025-26 Tax Year
# =============================================================================
# UK Tax Year: April 6, 2025 to April 5, 2026
# Source: gov.uk (HMRC)
# =============================================================================

# Identity
jurisdiction_id: "GB"
tax_year: 2025

# Metadata
jurisdiction_type: "country"
jurisdiction_name: "United Kingdom"
jurisdiction_abbreviation: "UK"
parent_jurisdiction_id: null

# International extensions
country_code: "GB"
currency_code: "GBP"
tax_year_format: "uk_fiscal"

# Tax characteristics
has_income_tax: true
income_tax_type: "graduated"

# Effective dates (UK fiscal year)
effective_start_date: "2025-04-06"
effective_end_date: "2026-04-05"

# Income Tax Rate Schedule - England/Wales/NI (2025-26)
rate_schedule:
  rate_type: "graduated"
  flat_rate: null
  brackets:
    # Personal Allowance (0%)
    - bracket_id: "GB-2025-PA"
      filing_status: "all"
      income_from: 0
      income_to: 12570
      rate: 0.00
      base_tax: 0
    # Basic Rate
    - bracket_id: "GB-2025-BASIC"
      filing_status: "all"
      income_from: 12570
      income_to: 50270
      rate: 0.20
      base_tax: 0
    # Higher Rate
    - bracket_id: "GB-2025-HIGHER"
      filing_status: "all"
      income_from: 50270
      income_to: 125140
      rate: 0.40
      base_tax: 7540  # 37700 * 0.20
    # Additional Rate
    - bracket_id: "GB-2025-ADDITIONAL"
      filing_status: "all"
      income_from: 125140
      income_to: null
      rate: 0.45
      base_tax: 37488  # 7540 + (125140-50270) * 0.40 = 7540 + 29948 = 37488
  surtaxes: []

# Scotland Income Tax Brackets (2025-26)
# Scotland has separate tax bands
scotland_brackets:
  - bracket_id: "GB-2025-SCOTLAND-STARTER"
    filing_status: "all"
    income_from: 0
    income_to: 15397
    rate: 0.19
    base_tax: 0
  - bracket_id: "GB-2025-SCOTLAND-BASIC"
    filing_status: "all"
    income_from: 15397
    income_to: 27491
    rate: 0.20
    base_tax: 2926  # (15397-0) * 0.19
  - bracket_id: "GB-2025-SCOTLAND-INTERMEDIATE"
    filing_status: "all"
    income_from: 27491
    income_to: 43662
    rate: 0.21
    base_tax: 5345  # 2926 + (27491-15397) * 0.20
  - bracket_id: "GB-2025-SCOTLAND-HIGHER"
    filing_status: "all"
    income_from: 43662
    income_to: 75000
    rate: 0.42
    base_tax: 8731  # 5345 + (43662-27491) * 0.21
  - bracket_id: "GB-2025-SCOTLAND-ADVANCED"
    filing_status: "all"
    income_from: 75000
    income_to: 125140
    rate: 0.45
    base_tax: 23903  # 8731 + (75000-43662) * 0.42
  - bracket_id: "GB-2025-SCOTLAND-TOP"
    filing_status: "all"
    income_from: 125140
    income_to: null
    rate: 0.48
    base_tax: 46466  # 23903 + (125140-75000) * 0.45

# Personal Allowance Taper (2025-26)
personal_allowance_taper:
  base_amount: 12570
  taper_threshold: 100000
  taper_rate: 0.5
  minimum: 0

# National Insurance Class 1 (2025-26)
# Employee (Primary) and Employer (Secondary) contributions
social_insurance:
  components:
    - component_id: "GB-NI-CLASS1-EMPLOYEE"
      name: "National Insurance Class 1 (Employee)"
      type: "general_social"
      employee_rate: 0.08
      employer_rate: null
      primary_threshold: 12570
      upper_limit: 50270
      additional_rate: 0.02
      notes: "8% on earnings £12,570 to £50,270, then 2% above £50,270"
    - component_id: "GB-NI-CLASS1-EMPLOYER"
      name: "National Insurance Class 1 (Employer)"
      type: "employer_social"
      employee_rate: null
      employer_rate: 0.15
      secondary_threshold: 5000
      notes: "15% on earnings above £5,000 (Secondary Threshold)"
  calculation_method: "banded"
  employer_contribution: true
  employee_contribution: true

# Student Loan Repayment Thresholds (2025-26)
student_loan_plans:
  - plan_id: "plan_1"
    name: "Plan 1 (pre-2012)"
    threshold: 26065
    rate: 0.09
  - plan_id: "plan_2"
    name: "Plan 2 (post-2012)"
    threshold: 28470
    rate: 0.09
  - plan_id: "plan_4"
    name: "Plan 4 (Scotland)"
    threshold: 32745
    rate: 0.09
  - plan_id: "plan_5"
    name: "Plan 5 (post-2023)"
    threshold: 25000
    rate: 0.09
  - plan_id: "postgrad"
    name: "Postgraduate Loan"
    threshold: 21000
    rate: 0.06

# Capital Gains Tax (2025-26)
capital_gains:
  annual_exempt_amount: 3000
  basic_rate: 0.18
  higher_rate: 0.24

# Deductions
deductions:
  standard_deduction:
    available: false
    amounts: []
    additional_amounts: []
  exemptions:
    personal_exemption_available: false
    personal_exemption_amount: 0
    dependent_exemption_available: false
    dependent_exemption_amount: 0

# Verification
verification:
  status: "verified"
  last_verified: "2026-02-17"
  verified_by: "external_consultant"
  notes: "Verified against gov.uk HMRC official rates for 2025-26 tax year"

references:
